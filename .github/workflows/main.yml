name: Daily Asset Report

on:
  schedule:
    # 매일 UTC 00시 00분 = 한국 시간(KST) 오전 9시 00분
    - cron: '0 0 * * *' 
  workflow_dispatch: # 수동으로 실행해볼 수 있는 버튼 생성

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 구글 시트 인증 파일(secrets.json) 생성
        run: echo "${{ secrets.GCP_CREDENTIALS }}" > secrets.json

      - name: 파이썬 스크립트 실행 (main.py)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 배포용 폴더 만들고 index.html 이동
        run: |
          mkdir public
          mv index.html public/

      - name: GitHub Pages에 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages